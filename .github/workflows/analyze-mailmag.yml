name: AI 配信実績分析（日次）

# 配信から 7日以上経過した未分析メルマガを Claude API で分析し、
# outputs.json の results.aiAnalysis に書き戻して main にコミット。

on:
  schedule:
    # 毎日 09:00 JST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      brand:
        description: "対象ブランドID（空＝全ブランド）"
        required: false
        default: ""
      id:
        description: "特定の outputId のみ分析（7日チェックをスキップ）"
        required: false
        default: ""
      force:
        description: "既存 aiAnalysis を上書き再生成"
        required: false
        type: boolean
        default: false
      max:
        description: "1回の最大分析件数"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.brand }}" ]; then ARGS="$ARGS --brand ${{ inputs.brand }}"; fi
          if [ -n "${{ inputs.id }}" ]; then ARGS="$ARGS --id ${{ inputs.id }}"; fi
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "${{ inputs.max }}" ]; then ARGS="$ARGS --max ${{ inputs.max }}"; fi
          node scripts/analyze-mailmag.mjs $ARGS

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/data/brands/*/outputs.json
          git commit -m "chore: AI分析を更新（自動）"
          git push origin main
