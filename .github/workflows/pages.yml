# ============================================================
# GitHub Pages デプロイ
# ============================================================
# mainブランチにpushすると、メルマガエディタを
# GitHub Pages に自動デプロイします。
#
# URL: https://tiast2026.github.io/Mail-magazine/
# ============================================================

name: GitHub Pages デプロイ

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: ビルド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 依存パッケージ インストール
        run: npm ci || npm install

      - name: 静的サイトビルド
        run: npm run build

      - name: GitHub Pages アーティファクト アップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    name: デプロイ
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
