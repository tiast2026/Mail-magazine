# ============================================================
# 手動デプロイ
# ============================================================
# いつ動く？
#   - GitHubの「Actions」タブ → 「手動デプロイ」→ 「Run workflow」を押したとき
#
# 何をする？
#   - 選択した環境（本番 or ステージング）にデプロイする
#
# 事前準備：
#   GitHub → Settings → Secrets に以下を登録：
#     DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, ANTHROPIC_API_KEY
# ============================================================

name: 手動デプロイ

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先を選択"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

# 同じ環境への同時デプロイを防止
concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: デプロイ実行（${{ github.event.inputs.environment }}）
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      # Secretsが登録されているか確認
      - name: デプロイ設定チェック
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "❌ エラー: DEPLOY_HOST が未設定です"
            echo "  GitHub → Settings → Secrets に以下を登録してください："
            echo "    DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, ANTHROPIC_API_KEY"
            exit 1
          fi
          echo "✅ デプロイ設定OK"

      # Dockerイメージをビルド
      - name: Dockerイメージ ビルド
        run: |
          docker build -t mail-magazine-backend ./backend
          docker build -t mail-magazine-frontend ./frontend

      # サーバーにファイルを転送
      - name: サーバーにファイル転送
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,db/init.sql,backend/,frontend/,.env.example"
          target: "/opt/mail-magazine"

      # サーバー上でDocker Composeを再起動
      - name: サーバーでアプリを再起動
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/mail-magazine
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
            echo "RAKUTEN_API_KEY=${{ secrets.RAKUTEN_API_KEY }}" >> .env
            docker compose down
            docker compose up -d --build
            echo "コンテナ起動を待機中..."
            sleep 15
            curl -sf http://localhost:8000/health || { echo "❌ ヘルスチェック失敗"; exit 1; }
            echo "✅ デプロイ完了！"
            docker compose ps

      # デプロイ結果をGitHub上に表示
      - name: デプロイ結果レポート
        if: always()
        run: |
          echo "## デプロイ結果" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 環境 | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| コミット | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ブランチ | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 実行者 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
