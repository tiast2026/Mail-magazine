# ============================================================
# CI/CD パイプライン
# ============================================================
# いつ動く？
#   - main ブランチに push したとき
#   - main 向けの Pull Request を作成・更新したとき
#   - claude/ で始まるブランチに push したとき
#
# 何をする？
#   1. backend-check   : Pythonコードの品質チェック + DB接続確認
#   2. frontend-build  : Next.jsアプリのビルド確認
#   3. docker-build    : Dockerイメージが正しく作れるか確認
#   4. deploy          : mainブランチのみ → 本番サーバーへ自動デプロイ
#
# デプロイを有効にするには？
#   GitHub → Settings → Secrets に以下を登録するだけ：
#     DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, ANTHROPIC_API_KEY
#   登録すれば main への push で自動デプロイされます。
#   未登録の場合はデプロイステップが自動スキップされます。
# ============================================================

name: CI（自動テスト＆デプロイ）

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

# ──────────────────────────────────────────────
# ジョブ1: バックエンドチェック
# ──────────────────────────────────────────────
jobs:
  backend-check:
    name: バックエンド チェック
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # テスト用PostgreSQLを自動起動
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mailmagazine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 依存パッケージのキャッシュ（2回目以降を高速化）
      - name: pipキャッシュ
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 依存パッケージ インストール
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      # コード品質チェック（構文エラー・未使用import等）
      - name: コード品質チェック（ruff）
        run: |
          pip install ruff
          ruff check app/ --select E,F,I --ignore E501
        continue-on-error: true

      # アプリが正しく起動できるか確認
      - name: アプリ起動確認
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mailmagazine_test
          ANTHROPIC_API_KEY: sk-test-dummy
        run: python -c "from app.main import app; print('OK: バックエンド正常')"

      # DBスキーマが正しく作成できるか確認
      - name: DBスキーマ作成確認
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d mailmagazine_test -f ../db/init.sql

  # ──────────────────────────────────────────────
  # ジョブ2: フロントエンドビルド
  # ──────────────────────────────────────────────
  frontend-build:
    name: フロントエンド ビルド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 22 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: node_modulesキャッシュ
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: 依存パッケージ インストール
        run: npm install

      - name: TypeScript 型チェック
        run: npx tsc --noEmit
        continue-on-error: true

      # Next.jsビルド（本番用HTMLを生成できるか確認）
      - name: Next.js ビルド
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

  # ──────────────────────────────────────────────
  # ジョブ3: Dockerイメージ ビルド確認
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker ビルド確認
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: バックエンド Dockerイメージ ビルド
        run: docker build -t mail-magazine-backend ./backend

      - name: フロントエンド Dockerイメージ ビルド
        run: docker build -t mail-magazine-frontend ./frontend

  # ──────────────────────────────────────────────
  # ジョブ4: 本番デプロイ（mainブランチのみ）
  #
  # DEPLOY_HOST が登録されていれば自動実行。
  # 未登録なら自動スキップ（エラーにはならない）。
  # ──────────────────────────────────────────────
  deploy:
    name: 本番デプロイ
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Secretsが登録されているか確認
      - name: デプロイ設定チェック
        id: check
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ DEPLOY_HOST が未設定のためデプロイをスキップします"
            echo "  GitHub → Settings → Secrets に以下を登録してください："
            echo "    DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, ANTHROPIC_API_KEY"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ デプロイ設定を確認しました"
          fi

      # サーバーにファイルを転送
      - name: サーバーにファイル転送
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,db/init.sql,backend/,frontend/,.env.example"
          target: "/opt/mail-magazine"

      # サーバー上でDocker Composeを再起動
      - name: サーバーでアプリを再起動
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/mail-magazine
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
            echo "RAKUTEN_API_KEY=${{ secrets.RAKUTEN_API_KEY }}" >> .env
            docker compose down
            docker compose up -d --build
            echo "コンテナ起動を待機中..."
            sleep 15
            curl -sf http://localhost:8000/health || { echo "❌ ヘルスチェック失敗"; exit 1; }
            echo "✅ デプロイ完了！"
            docker compose ps

      # デプロイ結果をGitHub上に表示
      - name: デプロイ結果レポート
        if: always()
        run: |
          echo "## デプロイ結果" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| コミット | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 実行者 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.configured }}" = "true" ]; then
            echo "| ステータス | ✅ デプロイ実行済 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ステータス | ⏭️ スキップ（Secrets未設定） |" >> $GITHUB_STEP_SUMMARY
          fi
