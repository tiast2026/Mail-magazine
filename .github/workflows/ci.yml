# ============================================================
# CI パイプライン
# ============================================================
# いつ動く？
#   - main ブランチに push したとき
#   - main 向けの Pull Request を作成・更新したとき
#   - claude/ で始まるブランチに push したとき
#
# 何をする？
#   1. backend-check   : Pythonコードの品質チェック + DB接続確認
#   2. frontend-build  : Next.jsアプリのビルド確認
#   3. docker-build    : Dockerイメージが正しく作れるか確認
#   4. deploy          : mainブランチのみ → 本番サーバーへデプロイ
# ============================================================

name: CI（自動テスト＆デプロイ）

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

# ──────────────────────────────────────────────
# ジョブ1: バックエンドチェック
# ──────────────────────────────────────────────
jobs:
  backend-check:
    name: バックエンド チェック
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # テスト用PostgreSQLを自動起動
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mailmagazine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Python環境セットアップ
      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 依存パッケージのキャッシュ（2回目以降を高速化）
      - name: pipキャッシュ
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      # 依存パッケージインストール
      - name: 依存パッケージ インストール
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      # コード品質チェック（構文エラー・未使用import等）
      - name: コード品質チェック（ruff）
        run: |
          pip install ruff
          ruff check app/ --select E,F,I --ignore E501
        continue-on-error: true

      # アプリが正しく起動できるか確認
      - name: アプリ起動確認
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mailmagazine_test
          ANTHROPIC_API_KEY: sk-test-dummy
        run: python -c "from app.main import app; print('OK: バックエンド正常')"

      # DBスキーマが正しく作成できるか確認
      - name: DBスキーマ作成確認
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d mailmagazine_test -f ../db/init.sql

  # ──────────────────────────────────────────────
  # ジョブ2: フロントエンドビルド
  # ──────────────────────────────────────────────
  frontend-build:
    name: フロントエンド ビルド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 22 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # node_modulesのキャッシュ（2回目以降を高速化）
      - name: node_modulesキャッシュ
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: 依存パッケージ インストール
        run: npm install

      # TypeScriptの型チェック
      - name: TypeScript 型チェック
        run: npx tsc --noEmit
        continue-on-error: true

      # Next.jsビルド（本番用HTMLを生成できるか確認）
      - name: Next.js ビルド
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

  # ──────────────────────────────────────────────
  # ジョブ3: Dockerイメージ ビルド確認
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker ビルド確認
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]  # ↑の2つが成功した後に実行

    steps:
      - uses: actions/checkout@v4

      - name: バックエンド Dockerイメージ ビルド
        run: docker build -t mail-magazine-backend ./backend

      - name: フロントエンド Dockerイメージ ビルド
        run: docker build -t mail-magazine-frontend ./frontend

  # ──────────────────────────────────────────────
  # ジョブ4: 本番デプロイ（mainブランチのみ）
  # ──────────────────────────────────────────────
  deploy:
    name: 本番デプロイ
    runs-on: ubuntu-latest
    needs: [docker-build]  # Dockerビルドが成功した後に実行
    # mainブランチへの直接pushの場合のみ実行
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # ===================================================
      # ↓↓↓ デプロイ先を設定したらコメントを外してください ↓↓↓
      # ===================================================
