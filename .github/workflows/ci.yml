name: CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mailmagazine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --select E,F,I --ignore E501
        continue-on-error: true

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - name: Verify imports
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mailmagazine_test
          ANTHROPIC_API_KEY: sk-test-dummy
        run: python -c "from app.main import app; print('Backend imports OK')"

      - name: Initialize database schema
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d mailmagazine_test -f ../db/init.sql

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-and-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t mail-magazine-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t mail-magazine-frontend ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "Deploy triggered for main branch - commit ${{ github.sha }}"

